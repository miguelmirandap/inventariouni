{% extends 'base.html' %}
{% block content %}
<section class="panel" style="max-width: 520px;">
  <h2>Cambiar contrasena</h2>
  <form method="post" class="grid-form">
    <label>Contrasena actual<input type="password" name="password_actual" required /></label>
    <label>Nueva contrasena<input type="password" name="password_nueva" minlength="6" required /></label>
    <label>Confirmar nueva contrasena<input type="password" name="password_confirmar" minlength="6" required /></label>
    <button type="submit">Actualizar</button>
  </form>
</section>
{% endblock %}
